metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: krknusergroups.krkn.krkn-chaos.dev
spec:
  group: krkn.krkn-chaos.dev
  names:
    kind: KrknUserGroup
    listKind: KrknUserGroupList
    plural: krknusergroups
    shortNames:
    - kug
    singular: krknusergroup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.description
      name: Description
      type: string
    - jsonPath: .spec.clusterPermissions
      name: Clusters
      priority: 1
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KrknUserGroup is the Schema for the krknusergroups API.
          It defines cluster-level access control for groups of users.

          Users are associated with groups via labels on their KrknUser CR:
            - group.krkn.krkn-chaos.dev/<group-name>: "true"

          Permissions are aggregated across all groups a user belongs to (union).
          Admin users bypass all group-based access controls.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              KrknUserGroupSpec defines the desired state of KrknUserGroup.
              KrknUserGroup defines cluster access permissions for a group of users.
              User membership is managed via labels on KrknUser CRs: group.krkn.krkn-chaos.dev/<group-name>=true
            properties:
              clusterPermissions:
                additionalProperties:
                  description: ClusterPermissionSet defines the actions allowed on
                    a cluster.
                  properties:
                    actions:
                      description: |-
                        Actions is the list of allowed actions on this cluster
                        Allowed values: "view" (can view cluster and scenario runs),
                                        "run" (can launch scenarios),
                                        "cancel" (can cancel running scenarios)
                      items:
                        enum:
                        - view
                        - run
                        - cancel
                        type: string
                      minItems: 1
                      type: array
                  required:
                  - actions
                  type: object
                description: |-
                  ClusterPermissions defines access permissions per cluster
                  Key: cluster API URL (must match ClusterTarget.ClusterAPIURL from KrknTargetRequest)
                  Value: set of allowed actions (view, run, cancel)
                minProperties: 1
                type: object
              description:
                description: Description is a human-readable description of the group's
                  purpose
                type: string
              name:
                description: Name is the group name (duplicates metadata.name for
                  API convenience)
                type: string
            required:
            - clusterPermissions
            - name
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
