# Default values for krkn-operator
# This is a YAML-formatted file.

## Global settings
global:
  # Namespace where to install (if empty, uses Release.Namespace)
  namespaceOverride: ""

## Images configuration
images:
  operator:
    image: quay.io/krkn-chaos/krkn-operator:latest
    # Use Always for :latest to ensure multi-arch images are pulled correctly
    pullPolicy: Always
  dataProvider:
    image: quay.io/krkn-chaos/krkn-operator-data-provider:latest
    pullPolicy: Always
  acm:
    image: quay.io/krkn-chaos/krkn-operator-acm:latest
    pullPolicy: Always
  console:
    image: quay.io/krkn-chaos/krkn-operator-console:latest
    pullPolicy: Always
  pullSecrets: []
  # - name: my-registry-secret

## Authentication & Security
auth:
  # JWT secret for token signing (base64 encoded)
  # If empty, a random one is generated by Helm
  # To provide your own: echo -n "your-secret-key" | base64
  jwtSecret: ""

  # JWT token expiry in hours (default: 24)
  # Passed to operator as JWT_EXPIRY_HOURS environment variable
  jwtExpiryHours: 24

## Core Operator
operator:
  enabled: true
  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Data provider sidecar resources
  dataProvider:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  service:
    type: ClusterIP
    port: 8080
    grpcPort: 50051

  logging:
    level: info  # debug, info, warn, error
    format: json  # json or text

  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

## ACM Integration (optional)
acm:
  enabled: false
  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    port: 8080
    grpcPort: 50051

  config:
    # Secret name for ACM managed clusters (must exist - created by OpenShift ACM)
    secretName: "application-manager"

  logging:
    level: info
    format: json

  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

## Console (web UI)
console:
  enabled: true
  replicaCount: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  service:
    type: ClusterIP
    port: 3000
    # NodePort (only used if type: NodePort)
    nodePort: 30080

  # Ingress configuration (Kubernetes - legacy)
  ingress:
    enabled: false
    className: "nginx"
    hostname: "krkn-operator.example.com"

    tls:
      enabled: false
      secretName: ""  # If empty, uses hostname to generate name

    # Annotations (for cert-manager, AWS ALB, etc.)
    annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # kubernetes.io/ingress.class: alb

  # Gateway API configuration (Kubernetes - recommended)
  # Requires Gateway API CRDs installed in the cluster
  # See: https://gateway-api.sigs.k8s.io/
  gateway:
    enabled: false

    # Name of the existing Gateway resource to attach to
    gatewayName: "krkn-gateway"

    # Namespace of the Gateway (if different from release namespace)
    # Leave empty to use the same namespace
    gatewayNamespace: ""

    # Optional: Listener/Section name on the Gateway to attach to
    # Useful when Gateway has multiple listeners
    sectionName: ""

    # Hostname for the HTTPRoute
    hostname: "krkn-operator.example.com"

    # Path configuration
    path: "/"
    pathType: "PathPrefix"  # PathPrefix, Exact, or ImplementationSpecific

    # Annotations for the HTTPRoute resource
    annotations: {}

  # OpenShift Route configuration
  route:
    enabled: false
    hostname: "krkn-operator.apps.cluster.example.com"

    tls:
      enabled: true
      termination: edge  # edge, passthrough, reencrypt
      insecureEdgeTerminationPolicy: Redirect

    annotations: {}

  logging:
    level: info
    format: json

  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

## RBAC
rbac:
  create: true

## ServiceAccount
serviceAccount:
  create: true
  name: ""
  annotations: {}

## CRDs
crds:
  # Keep CRDs on chart uninstall
  keep: true

## Monitoring (optional)
monitoring:
  enabled: false  # SAFE DEFAULT for Kind/Minikube

  service:
    port: 8443
    annotations: {}

  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

## Network Policy (optional)
networkPolicy:
  enabled: false
  ingress: []
  egress: []

## Update strategy
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

## Pod disruption budget (for HA)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

## Common labels/annotations
commonLabels: {}
commonAnnotations: {}

## Name overrides
nameOverride: ""
fullnameOverride: ""
