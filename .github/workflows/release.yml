name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set version from tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "Building version: ${GITHUB_REF#refs/tags/}"

      - name: Build and push operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/krkn-chaos/krkn-operator:${{ env.VERSION }}
            quay.io/krkn-chaos/krkn-operator:latest

      - name: Build and push data-provider image
        uses: docker/build-push-action@v6
        with:
          context: ./krkn-operator-data-provider
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            quay.io/krkn-chaos/krkn-operator-data-provider:${{ env.VERSION }}
            quay.io/krkn-chaos/krkn-operator-data-provider:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat <<EOF > release-notes.md
          ## Container Images

          Multi-architecture images (linux/amd64, linux/arm64):

          - \`quay.io/krkn-chaos/krkn-operator:$VERSION\`
          - \`quay.io/krkn-chaos/krkn-operator:latest\`
          - \`quay.io/krkn-chaos/krkn-operator-data-provider:$VERSION\`
          - \`quay.io/krkn-chaos/krkn-operator-data-provider:latest\`

          ## Helm Chart

          - \`oci://quay.io/krkn-chaos/charts/krkn-operator:${VERSION#v}\`

          ## Installation

          \`\`\`bash
          # Using Helm (recommended)
          helm install krkn-operator oci://quay.io/krkn-chaos/charts/krkn-operator --version ${VERSION#v}

          # Using kubectl
          make deploy IMG=quay.io/krkn-chaos/krkn-operator:$VERSION
          \`\`\`
          EOF

          gh release create $VERSION --title "Release $VERSION" --notes-file release-notes.md
